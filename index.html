<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Festival - Guestbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-red: #e11d48;
            --space-dark: #0f172a;
        }
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #f8fafc;
            color: var(--space-dark);
            -webkit-tap-highlight-color: transparent;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .hero-gradient { 
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); 
        }
        .comment-card { 
            border-left: 4px solid var(--space-red); 
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--space-red);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* เพิ่มสมูทสโครลและการปรับแต่งปุ่มบนมือถือ */
        input, textarea { font-size: 16px !important; } /* ป้องกัน iOS ซูมเข้าตอนพิมพ์ */
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-rose-600 rounded-full flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </div>
                <span class="orbitron font-bold text-lg sm:text-xl text-rose-600 tracking-tighter truncate">SPACE FEST</span>
            </div>
            <div class="hidden sm:block text-[10px] orbitron font-bold text-gray-400 uppercase tracking-widest">Mission Control</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-gradient text-white py-12 md:py-20 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="orbitron text-3xl md:text-5xl lg:text-6xl font-bold mb-4 tracking-tight leading-tight">GUESTBOOK</h1>
            <p class="text-rose-100 text-sm md:text-lg max-w-xl mx-auto font-light leading-relaxed">
                ร่วมส่งข้อความประทับใจของคุณ บันทึกสู่สถานี Comment-Pancake <br class="hidden md:block">
                ข้อมูลจะถูกจัดเก็บไว้ในฐานข้อมูลการเดินทางของเรา
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto w-full px-4 sm:px-6 -mt-8 md:-mt-12 pb-20 flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            
            <!-- Left Column: Form Area -->
            <div class="lg:col-span-4">
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 lg:sticky lg:top-24">
                    <h2 class="orbitron text-rose-600 font-bold mb-6 flex items-center text-lg">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"></path><path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd"></path></svg>
                        NEW ENTRY
                    </h2>
                    <form id="commentForm" class="space-y-4">
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Commander Name</label>
                            <input type="text" id="name" placeholder="ชื่อของคุณ..." required 
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:bg-white outline-none transition-all text-sm">
                        </div>
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Mission Report</label>
                            <textarea id="message" placeholder="พิมพ์ข้อความที่นี่..." required rows="4" 
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:bg-white outline-none transition-all text-sm resize-none"></textarea>
                        </div>
                        <button type="submit" id="submitBtn" 
                            class="w-full bg-rose-600 hover:bg-rose-700 active:scale-[0.98] text-white font-bold py-4 rounded-xl shadow-lg shadow-rose-200 transition-all flex items-center justify-center space-x-2">
                            <span>SEND LOG ENTRY</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </button>
                    </form>
                    <div id="statusMessage" class="mt-4 text-center text-xs hidden p-3 rounded-xl font-semibold"></div>
                </div>
            </div>

            <!-- Right Column: List Area -->
            <div class="lg:col-span-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-2">
                    <h2 class="orbitron text-xl md:text-2xl font-bold text-gray-800 flex items-center tracking-tight">
                        MISSION LOGS
                        <div class="ml-3 h-px flex-grow bg-gray-100 hidden sm:block"></div>
                    </h2>
                    <span id="commentCount" class="bg-rose-100 text-rose-600 text-[10px] font-bold px-4 py-1.5 rounded-full self-start sm:self-center tracking-widest uppercase">0 RECORDS</span>
                </div>

                <div id="loading" class="bg-white rounded-2xl p-12 text-center border border-dashed border-gray-200">
                    <div class="loader mb-4"></div>
                    <p class="text-gray-400 font-light text-sm tracking-wide">กำลังสแกนหาข้อความจากดาวเทียม...</p>
                </div>

                <div id="commentsContainer" class="space-y-4">
                    <!-- ข้อความจะปรากฏที่นี่ -->
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="orbitron text-rose-600 font-bold text-sm mb-4">SPACE FESTIVAL 2024</div>
            <p class="text-gray-400 text-[10px] tracking-[0.3em] uppercase">© Starbase Station Comment-Pancake Control Center</p>
        </div>
    </footer>

    <script>
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUgIN9Y1ukdfMXCHqJ5Bqd-mXSMMoqJS0G7CXARihd7UD2MwWbZJLuJF6BKrHUUOs6/exec';

        const commentForm = document.getElementById('commentForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const commentsContainer = document.getElementById('commentsContainer');
        const loading = document.getElementById('loading');

        async function fetchComments() {
            try {
                const response = await fetch(APP_SCRIPT_URL);
                const data = await response.json();
                renderComments(data);
            } catch (e) {
                console.error("Fetch error:", e);
                loading.innerHTML = '<div class="text-rose-500 font-bold py-10">ขออภัย: ไม่สามารถดึงข้อมูลได้ในขณะนี้</div>';
            }
        }

        function renderComments(comments) {
            loading.style.display = 'none';
            commentsContainer.innerHTML = '';
            const list = Array.isArray(comments) ? comments : [];
            document.getElementById('commentCount').innerText = `${list.length} RECORDS`;

            if (list.length === 0) {
                commentsContainer.innerHTML = `
                    <div class="bg-white rounded-2xl p-12 text-center border border-gray-100 shadow-sm">
                        <p class="text-gray-400 italic font-light">ยังไม่มีการบันทึกข้อมูลในระบบ...</p>
                    </div>
                `;
                return;
            }

            list.slice().reverse().forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment-card bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow';
                div.innerHTML = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-3 gap-1">
                        <span class="font-bold text-gray-800 text-base flex items-center">
                            <svg class="w-4 h-4 mr-2 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                            ${escapeHtml(c.name)}
                        </span>
                        <span class="text-[10px] orbitron text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100 self-start sm:self-center">
                            ${c.timestamp}
                        </span>
                    </div>
                    <p class="text-gray-600 text-sm md:text-base font-light leading-relaxed whitespace-pre-wrap">${escapeHtml(c.message)}</p>
                `;
                commentsContainer.appendChild(div);
            });
        }

        commentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loader"></div> <span class="ml-2 italic">UPLOADING...</span>';

            try {
                const finalUrl = `${APP_SCRIPT_URL}?name=${encodeURIComponent(name)}&message=${encodeURIComponent(message)}`;
                
                // ใช้ mode: 'no-cors' เพื่อประสิทธิภาพสูงสุด
                await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

                showStatus('บันทึกข้อมูลเข้าสู่ระบบเรียบร้อย!', 'bg-green-50 text-green-700 border border-green-100');
                commentForm.reset();
                
                // รีโหลดข้อความหลังจากส่ง 2 วินาที
                setTimeout(fetchComments, 2000);
            } catch (err) {
                showStatus('เกิดข้อผิดพลาดทางการเชื่อมต่อ กรุณาลองใหม่', 'bg-rose-50 text-rose-700 border border-rose-100');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>SEND LOG ENTRY</span> <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7M5 5l7 7-7 7"></path></svg>';
            }
        });

        function showStatus(msg, classes) {
            statusMessage.innerText = msg;
            statusMessage.className = `mt-4 text-center text-xs p-4 rounded-xl block shadow-sm ${classes}`;
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 5000);
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        window.onload = fetchComments;
        // อัปเดตข้อมูลอัตโนมัติทุกๆ 1 นาที
        setInterval(fetchComments, 60000);
    </script>
</body>
</html>
